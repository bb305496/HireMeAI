<section class="account">
  <div class="account__container">

    <div class="card profile">
      <div class="profile__avatar">{{ profileAvatar }}</div>
      <h2 class="profile__name" [title]="userName()">{{ userName() }}</h2>
      <p class="profile__email" [title]="userEmail()">{{ userEmail() }}</p>

      <div class="profile__location">
        <svg class="profile__location-icon" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M8 1.5C5.515 1.5 3.5 3.515 3.5 6c0 3.75 4.5 8.5 4.5 8.5s4.5-4.75 4.5-8.5c0-2.485-2.015-4.5-4.5-4.5Zm0 6a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3Z" fill="currentColor"/>
        </svg>

        @if (!isEditingLocation()) {
          <span class="profile__location-row">
            <span class="profile__location-text" [title]="userLocation() || ''">
              {{ userLocation() || 'No location set' }}
            </span>
            <button
              class="profile__location-btn profile__location-btn--edit"
              (click)="startEditing()"
              title="Edit location">
              <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M11.013 2.5a1.5 1.5 0 0 1 2.121 2.121L5.5 12.256l-2.828.707.707-2.828L11.013 2.5Z" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </span>
        } @else {
          <div class="profile__location-edit">
            <input
              type="text"
              class="profile__location-input"
              [value]="editLocationValue()"
              (input)="updateEditValue($event)"
              (keyup.enter)="saveLocation()"
              (keyup.escape)="cancelEditing()"
              placeholder="Enter your city..."
              maxlength="80"
              autofocus
            />
            <div class="profile__location-actions">
              <button
                class="profile__location-btn profile__location-btn--save"
                (click)="saveLocation()"
                title="Save">
                <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M2.5 8.5 6 12l7.5-8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </button>
              <button
                class="profile__location-btn profile__location-btn--cancel"
                (click)="cancelEditing()"
                title="Cancel">
                <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="m3.5 3.5 9 9M12.5 3.5l-9 9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
              </button>
              <span class="profile__location-counter" [class]="counterClass">
                {{ editLocationValue().length }} / {{ MAX_LOCATION_LENGTH }}
              </span>
            </div>
          </div>
        }
      </div>
    </div>

  </div>
</section>
