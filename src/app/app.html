<div class="app-wrapper">
  <app-header/>

  <main class="main-content">
    <router-outlet/>
  </main>

  @defer (on viewport; prefetch on idle){
    <app-footer/>
  } @placeholder {
    <div style="min-height: 10rem;">
      Loading...
    </div>
  }

  @if (isRegisterOpen()) {
    <app-register-modal/>
  }

  @if (isLoginOpen()) {
    <app-login-modal/>
  }

  <app-toast-container/>
</div>
